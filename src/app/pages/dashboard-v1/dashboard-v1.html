@if (isLoading()) {
  <div class="d-flex justify-content-center align-items-center" style="min-height: 200px;">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Chargement...</span>
    </div>
  </div>
} @else {

  @if (visibleCards().length === 0) {
    <div class="text-center py-5">
      <i class="feather icon-layout" style="font-size:3rem; opacity:0.3"></i>
      <p class="mt-3 text-muted">Aucune carte configurée pour votre rôle.</p>
    </div>
  }

  <div class="row g-3">
    @for (card of visibleCards(); track card.id) {
      <div class="col-6 col-md-4 col-xl-3">
        <div class="stat-card"
             [class.stat-card--clickable]="card.navigateTo"
             (click)="navigateTo(card)">

          <div class="stat-card__icon" [style.background]="card.iconBg">
            <i [class]="'feather ' + card.icon" [style.color]="card.iconColor"></i>
          </div>

          <div class="stat-card__body">
            @if (card.resolvedValue && card.resolvedValue !== '—') {
              <div class="stat-card__value">{{ card.resolvedValue }}</div>
            }
            <div class="stat-card__label">{{ card.subLabel || card.title }}</div>
          </div>

        </div>
      </div>
    }
  </div>

}
