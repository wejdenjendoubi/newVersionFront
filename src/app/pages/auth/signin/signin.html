<div class="auth-wrapper">
  <div class="auth-content">
    <div class="card border-0 shadow-lg">
      <div class="row align-items-center text-center">
        <div class="col-md-12">
          <div class="card-body">
            <form (submit)="onSubmit($event)">
              <div class="card-body text-center">
                <div class="logo-brand-container">
                  <h2 class="logo-text">COFAT</h2>
                  <div class="logo-underline"></div>
                </div>
              </div>

              <h4 class="mb-3 f-w-400">Signin</h4>

              @if (error()) {
                <div class="alert" [class.alert-danger]="!isBlocked()" [class.alert-warning]="isBlocked()" role="alert">
                  <i class="feather icon-alert-triangle me-2"></i>
                  {{ error() }}
                </div>
              }

              <div class="input-group mb-3">
                <input
                  type="text"
                  class="form-control"
                  [disabled]="isBlocked()"
                  [(ngModel)]="loginModal().username"
                  name="username"
                  placeholder="Username"
                />
              </div>

              <div class="input-group mb-4">
                <input
                  [type]="showPassword() ? 'text' : 'password'"
                  class="form-control"
                  [disabled]="isBlocked()"
                  [(ngModel)]="loginModal().password"
                  name="password"
                  placeholder="Password"
                />
              </div>

              <div class="d-grid mt-3">
                <button type="submit"
                        class="btn btn-primary btn-block mb-4 shadow"
                        [disabled]="isLoading() || isBlocked()">
                  @if (isLoading()) {
                    <span class="spinner-border spinner-border-sm me-2"></span>
                  }
                  {{ isBlocked() ? 'Accès Bloqué' : 'Signin' }}
                </button>
              </div>

              @if (!isBlocked()) {
                <p class="mb-2 text-muted">
                  Forgot password?
                  <a href="#" class="f-w-400">Reset</a>
                </p>
              } @else {
                <p class="text-danger fw-bold small">Contactez l'administrateur pour débloquer votre accès.</p>
              }
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
